<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.wrap{
  position:relative;
  width:320px;
  margin:auto;
}

video, canvas{
  width:100%;
  display:block;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<h3>G6PD Stable Build</h3>

<div class="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<br>

<button onclick="start()">Start</button>
<button onclick="capture()">Capture</button>
<button onclick="autoGrid()">Auto Grid</button>
<button onclick="reset()">Reset</button>

<p id="log"></p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const log = document.getElementById("log");

let stream = null;
let frame = null;
let samples = [];

let scaleX = 1;
let scaleY = 1;

// ===== START CAMERA =====
async function start(){

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {

      video.play();

      const rect = video.getBoundingClientRect();

      canvas.width = rect.width;
      canvas.height = rect.height;

      log.innerText = "camera ready";
    };

  }catch(e){
    log.innerText = "camera error: " + e;
  }
}

// ===== CAPTURE =====
function capture(){

  if(!video.videoWidth){
    log.innerText = "video not ready";
    return;
  }

  const w = video.videoWidth;
  const h = video.videoHeight;

  const temp = document.createElement("canvas");
  temp.width = w;
  temp.height = h;

  const tctx = temp.getContext("2d");
  tctx.drawImage(video,0,0,w,h);

  frame = tctx.getImageData(0,0,w,h);

  scaleX = w / canvas.width;
  scaleY = h / canvas.height;

  // draw frozen image
  ctx.drawImage(temp,0,0,canvas.width,canvas.height);

  log.innerText = "captured OK";
}

// ===== TAP =====
canvas.addEventListener("click",(e)=>{

  if(!frame){
    log.innerText = "tap but no frame";
    return;
  }

  const rect = canvas.getBoundingClientRect();

  const dx = e.clientX - rect.left;
  const dy = e.clientY - rect.top;

  samples.push({x:dx, y:dy});

  drawAll();

  log.innerText = `tap (${Math.round(dx)}, ${Math.round(dy)})`;
});

// ===== DRAW =====
function drawAll(){

  if(frame){

    const temp = document.createElement("canvas");
    temp.width = frame.width;
    temp.height = frame.height;

    const tctx = temp.getContext("2d");
    tctx.putImageData(frame,0,0);

    ctx.drawImage(temp,0,0,canvas.width,canvas.height);
  }

  samples.forEach((s,i)=>{

    ctx.beginPath();
    ctx.arc(s.x,s.y,15,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.stroke();

    ctx.fillStyle="yellow";
    ctx.fillText(i,s.x+5,s.y);
  });
}

// ===== AUTO GRID =====
function autoGrid(){

  if(!frame){
    log.innerText = "no frame";
    return;
  }

  samples = [];

  const rows = 5;
  const cols = 4;

  for(let r=1;r<=rows;r++){
    for(let c=1;c<=cols;c++){

      const x = canvas.width * (c/(cols+1));
      const y = canvas.height * (r/(rows+1));

      samples.push({x,y});
    }
  }

  drawAll();

  log.innerText = "grid OK";
}

// ===== RESET =====
function reset(){

  samples = [];

  if(frame){

    const temp = document.createElement("canvas");
    temp.width = frame.width;
    temp.height = frame.height;

    const tctx = temp.getContext("2d");
    tctx.putImageData(frame,0,0);

    ctx.drawImage(temp,0,0,canvas.width,canvas.height);
  }else{
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  log.innerText = "reset OK";
}

</script>

</body>
</html>

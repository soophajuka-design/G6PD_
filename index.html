<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h3 { margin:10px; }

/* container */
#container {
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
  background:black;
  border-radius:12px;
  overflow:hidden;
}

video, canvas {
  width:100%;
  display:block;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:2;
}

/* legend */
#legend {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  border-radius:8px;
  font-size:12px;
  z-index:3;
}

.dot {
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.normal { background:#22c55e; }
.deficient { background:#ef4444; }
.selected { background:#facc15; }
.grid { background:#ffffff; }

/* controls */
#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
}

.start { background:#2563eb; }
.normal { background:#22c55e; }
.deficient { background:#ef4444; }
.analyze { background:#f59e0b; }
.reset { background:#6b7280; }

</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="legend">
    <div><span class="dot normal"></span>Normal</div>
    <div><span class="dot deficient"></span>Deficient</div>
    <div><span class="dot selected"></span>Selected</div>
    <div><span class="dot grid"></span>Grid</div>
  </div>
</div>

<div id="controls">
  <button class="start" id="startBtn">Start</button>
  <button class="normal" onclick="setMode('normal')">Normal</button>
  <button class="deficient" onclick="setMode('deficient')">Deficient</button>
  <button class="analyze" onclick="analyze()">Analyze</button>
  <button class="reset" onclick="resetApp()">Reset</button>
</div>

<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:black;color:white;text-align:center;}

.container{
  position:relative;
  width:320px;
  margin:auto;
}

.aspect-box{
  position:relative;
  width:100%;
  padding-top: calc(12.8 / 7.1 * 100%);
}

video, canvas{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
}
</style>
</head>

<body>

<h3>Grid Alignment</h3>

<div class="container">
  <div class="aspect-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="grid"></canvas>
  </div>
</div>

<p id="log"></p>

<button onclick="start()">Start</button>
<button onclick="capture()">Capture</button>
<button onclick="drawTemplateGrid()">Template Grid</button>
<button onclick="autoAlign()">Auto Align</button>
<button onclick="reset()">Reset</button>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("grid");
const ctx = canvas.getContext("2d");
const log = document.getElementById("log");

let frame=null;
let scaleX=1, scaleY=1;

// ===== START =====
async function start(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  video.onloadedmetadata = ()=>{
    video.play();
    resizeCanvas();
  };
}

// ===== CAPTURE =====
function capture(){

  if(!video.videoWidth){
    log.innerText="video not ready";
    return;
  }

  const w=video.videoWidth;
  const h=video.videoHeight;

  const temp=document.createElement("canvas");
  temp.width=w; temp.height=h;

  const tctx=temp.getContext("2d");
  tctx.drawImage(video,0,0,w,h);

  frame = tctx.getImageData(0,0,w,h);

  scaleX = w / canvas.width;
  scaleY = h / canvas.height;

  ctx.drawImage(temp,0,0,canvas.width,canvas.height);

  log.innerText="captured";
}

// ===== RESIZE =====
function resizeCanvas(){
  const rect = video.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}

// ===== GRAY =====
function toGray(img){
  const g=new Uint8ClampedArray(img.width*img.height);
  for(let i=0,j=0;i<img.data.length;i+=4,j++){
    g[j]=(img.data[i]+img.data[i+1]+img.data[i+2])/3;
  }
  return g;
}

// ===== DETECT PAPER =====
function detectPaper(){

  if(!frame) return null;

  const w=frame.width;
  const h=frame.height;

  const g=toGray(frame);

  let pts=[];

  for(let y=10;y<h-10;y+=5){
    for(let x=10;x<w-10;x+=5){

      const gx=g[y*w+(x+1)]-g[y*w+(x-1)];
      const gy=g[(y+1)*w+x]-g[(y-1)*w+x];

      if(Math.abs(gx)+Math.abs(gy)>80){
        pts.push({x,y});
      }
    }
  }

  if(pts.length<50) return null;

  let tl={x:9999,y:9999}, tr={x:0,y:9999};
  let br={x:0,y:0}, bl={x:9999,y:0};

  pts.forEach(p=>{
    if(p.x+p.y < tl.x+tl.y) tl=p;
    if(p.x-p.y > tr.x-tr.y) tr=p;
    if(p.x+p.y > br.x+br.y) br=p;
    if(p.x-p.y < bl.x-bl.y) bl=p;
  });

  return [tl,tr,br,bl];
}

// ===== DRAW GRID ON PAPER =====
function drawGridOnQuad(corners){

  const [tl,tr,br,bl]=corners;

  function lerp(a,b,t){ return a+(b-a)*t; }
  function interp(p1,p2,t){
    return {x:lerp(p1.x,p2.x,t), y:lerp(p1.y,p2.y,t)};
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const temp=document.createElement("canvas");
  temp.width=frame.width;
  temp.height=frame.height;
  temp.getContext("2d").putImageData(frame,0,0);

  ctx.drawImage(temp,0,0,canvas.width,canvas.height);

  const cols=4, rows=5;

  ctx.strokeStyle="lime";

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){

      const tx=(c+0.5)/cols;
      const ty=(r+0.5)/rows;

      const top=interp(tl,tr,tx);
      const bottom=interp(bl,br,tx);
      const p=interp(top,bottom,ty);

      ctx.beginPath();
      ctx.arc(p.x/scaleX,p.y/scaleY,10,0,Math.PI*2);
      ctx.stroke();
    }
  }
}

// ===== AUTO ALIGN =====
function autoAlign(){

  const corners = detectPaper();

  if(!corners){
    log.innerText="no paper detected";
    return;
  }

  drawGridOnQuad(corners);

  log.innerText="aligned";
}

function drawTemplateGrid(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ===== draw background (frame) =====
  if(frame){
    const temp=document.createElement("canvas");
    temp.width=frame.width;
    temp.height=frame.height;
    temp.getContext("2d").putImageData(frame,0,0);

    ctx.drawImage(temp,0,0,canvas.width,canvas.height);
  }

  const cols = 4;
  const rows = 5;

  const vw = canvas.width;
  const vh = canvas.height;

  // 🔥 margin ให้เห็นขอบกระดาษ
  const margin = 0.15;

  const usableW = vw * (1 - margin*2);
  const usableH = vh * (1 - margin*2);

  // 🔥 lock ratio กระดาษจริง
  const ratio = 7.1 / 12.8;

  let gridW = usableW;
  let gridH = gridW / ratio;

  if(gridH > usableH){
    gridH = usableH;
    gridW = gridH * ratio;
  }

  const offsetX = (vw - gridW)/2;
  const offsetY = (vh - gridH)/2;

  const cellW = gridW / cols;
  const cellH = gridH / rows;

  // ===== outer frame =====
  ctx.strokeStyle="white";
  ctx.lineWidth=2;
  ctx.strokeRect(offsetX,offsetY,gridW,gridH);

  // ===== grid =====
  ctx.strokeStyle="rgba(255,255,255,0.5)";
  ctx.lineWidth=1;

  for(let i=1;i<cols;i++){
    ctx.beginPath();
    ctx.moveTo(offsetX+i*cellW,offsetY);
    ctx.lineTo(offsetX+i*cellW,offsetY+gridH);
    ctx.stroke();
  }

  for(let j=1;j<rows;j++){
    ctx.beginPath();
    ctx.moveTo(offsetX,offsetY+j*cellH);
    ctx.lineTo(offsetX+gridW,offsetY+j*cellH);
    ctx.stroke();
  }

  // ===== circles =====
  ctx.strokeStyle="lime";

  const r = Math.min(cellW,cellH)*0.25;

  for(let rIdx=0;rIdx<rows;rIdx++){
    for(let cIdx=0;cIdx<cols;cIdx++){

      const cx = offsetX + (cIdx+0.5)*cellW;
      const cy = offsetY + (rIdx+0.5)*cellH;

      ctx.beginPath();
      ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.stroke();
    }
  }

  log.innerText="template grid";
}
// ===== RESET =====
function reset(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(frame){
    const temp=document.createElement("canvas");
    temp.width=frame.width;
    temp.height=frame.height;
    temp.getContext("2d").putImageData(frame,0,0);

    ctx.drawImage(temp,0,0,canvas.width,canvas.height);
  }

  log.innerText="reset";
}

</script>
</body>
</html>

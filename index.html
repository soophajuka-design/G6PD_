<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G6PD Analyzer</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h3 { margin:10px; }

/* ✅ lock ratio */
#container {
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
  aspect-ratio: 10.65 / 19.2;
  border-radius:12px;
  overflow:hidden;
  background:black;
}

/* ✅ video fix iPhone */
video {
  position:absolute;
  top:50%;
  left:50%;
  height:100%;
  transform:translate(-50%,-50%);
}

/* overlay */
canvas {
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:2;
}

/* controls */
#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
}

.start { background:#2563eb; }
.normal { background:#22c55e; }
.deficient { background:#ef4444; }
.analyze { background:#f59e0b; }
.reset { background:#6b7280; }

</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="controls">
  <!-- 🔥 FIX: inline onclick -->
  <button class="start" onclick="startCameraDirect()">Start</button>
  <button class="normal" onclick="setMode('normal')">Normal</button>
  <button class="deficient" onclick="setMode('deficient')">Deficient</button>
  <button class="analyze" onclick="analyze()">Analyze</button>
  <button class="reset" onclick="resetApp()">Reset</button>
</div>

<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }

.container { position:relative; display:inline-block; }

video { width:320px; background:black; }

#template {
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

button { margin:5px; padding:10px; font-size:16px; }
</style>
</head>

<body>

<h2>G6PD Analyzer (Precision Mode)</h2>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="template"></canvas>
</div>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="stopCamera()">Stop Camera</button>
<button onclick="runLSQ()">Precision Fit</button>
<button onclick="autoCalibrate()">Auto Calibrate</button>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer Pro (Homography)</title>

<link rel="manifest" href="manifest.json">

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }
.container { position:relative; display:inline-block; }
video { width:320px; background:black; }
#overlay {
  position:absolute;
  top:0; left:0;
  pointer-events:none;
}
button { margin:6px; padding:10px; font-size:16px; }
</style>
</head>

<body>

<h3>G6PD Analyzer (Homography + Subpixel)</h3>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>

<button onclick="startCamera()">Start</button>
<button onclick="stopCamera()">Stop</button>
<button onclick="detectAndLock()">Auto Detect + Lock</button>
<button onclick="refineLSQ()">Refine (Subpixel)</button>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

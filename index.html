<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G6PD Analyzer PRO</title>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}

.container{
  position:relative;
  width:320px;
  margin:auto;
}

video{
  width:100%;
}

#overlay{
  position:absolute;
  top:0;
  left:0;
}

button{margin:5px;padding:10px;}
</style>
</head>

<body>

<h2>G6PD Analyzer PRO</h2>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>

<button id="btnStart" onclick="startCamera()">Start</button>
<button id="btnCapture" onclick="captureFrame()">Capture</button>
<button id="btnStop" onclick="stopCamera()">Stop</button>

<br>

<button onclick="autoDetect()">Auto Detect</button>
<button onclick="autoGridAlign()">Auto Grid</button>

<br>

<button onclick="resetSamples()">Reset</button>

<pre id="result"></pre>

<script src="app.js"></script>
<script src="ai.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer (Tap Mode)</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.container {
  position:relative;
  display:inline-block;
}

video {
  width:320px;
  background:black;
}

#overlay {
  position:absolute;
  top:0;
  left:0;
}

button {
  margin:6px;
  padding:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h3>G6PD Analyzer (Tap Sampling)</h3>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="stopCamera()">Stop Camera</button>
<button onclick="resetSamples()">Reset</button>

<p>Tap anywhere to measure RGB</p>

<pre id="result"></pre>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

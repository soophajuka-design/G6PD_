<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:black; color:white; text-align:center; font-family:Arial; }

.wrap{
  position:relative;
  width:320px;
  margin:auto;
}

video, canvas{
  width:100%;
  display:block;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<h3>G6PD Snap Grid + Detect</h3>

<div class="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<br>

<button onclick="start()">Start</button>
<button onclick="capture()">Capture</button>
<button onclick="autoGrid()">Auto Grid</button>
<button onclick="detectCircles()">Detect Circles</button>
<button onclick="snapGrid()">Snap Grid</button>
<button onclick="reset()">Reset</button>

<p id="log"></p>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const log = document.getElementById("log");

let stream=null;
let frame=null;
let gray=null;

let samples=[];     // grid
let detected=[];    // detected circles

let scaleX=1, scaleY=1;

// ===== START =====
async function start(){

  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  video.onloadedmetadata = ()=>{
    video.play();

    const rect = video.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;

    log.innerText="camera ready";
  };
}

// ===== CAPTURE =====
function capture(){

  const w=video.videoWidth;
  const h=video.videoHeight;

  const temp=document.createElement("canvas");
  temp.width=w; temp.height=h;

  const tctx=temp.getContext("2d");
  tctx.drawImage(video,0,0,w,h);

  frame = tctx.getImageData(0,0,w,h);

  gray = toGray(frame);

  scaleX = w / canvas.width;
  scaleY = h / canvas.height;

  ctx.drawImage(temp,0,0,canvas.width,canvas.height);

  log.innerText="captured";
}

// ===== TAP =====
canvas.addEventListener("click",(e)=>{

  if(!frame) return;

  const rect = canvas.getBoundingClientRect();
  const dx = e.clientX-rect.left;
  const dy = e.clientY-rect.top;

  samples.push({x:dx,y:dy});
  drawAll();
});

// ===== DRAW =====
function drawAll(){

  // redraw image
  const temp=document.createElement("canvas");
  temp.width=frame.width;
  temp.height=frame.height;

  temp.getContext("2d").putImageData(frame,0,0);
  ctx.drawImage(temp,0,0,canvas.width,canvas.height);

  // detected (green)
  detected.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x/scaleX,p.y/scaleY,10,0,Math.PI*2);
    ctx.strokeStyle="lime";
    ctx.stroke();
  });

  // samples (white)
  samples.forEach((s,i)=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,15,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.stroke();

    ctx.fillStyle="yellow";
    ctx.fillText(i,s.x+5,s.y);
  });
}

// ===== AUTO GRID =====
function autoGrid(){

  samples=[];

  const rows=5, cols=4;

  for(let r=1;r<=rows;r++){
    for(let c=1;c<=cols;c++){

      samples.push({
        x: canvas.width*(c/(cols+1)),
        y: canvas.height*(r/(rows+1))
      });
    }
  }

  drawAll();
  log.innerText="grid OK";
}

// ===== DETECT CIRCLES (SAFE VERSION) =====
function detectCircles(){

  if(!frame) return;

  let raw=[];

  const w=frame.width;
  const h=frame.height;

  // scan ละเอียดขึ้น
  for(let y=30;y<h-30;y+=10){
    for(let x=30;x<w-30;x+=10){

      let outer=0, inner=0, count=0;

      for(let a=0;a<360;a+=20){

        const rad=a*Math.PI/180;

        const x1=Math.round(x+22*Math.cos(rad));
        const y1=Math.round(y+22*Math.sin(rad));

        const x2=Math.round(x+12*Math.cos(rad));
        const y2=Math.round(y+12*Math.sin(rad));

        if(x1<0||y1<0||x1>=w||y1>=h) continue;
        if(x2<0||y2<0||x2>=w||y2>=h) continue;

        outer+=gray[y1*w+x1];
        inner+=gray[y2*w+x2];
        count++;
      }

      if(count<8) continue;

      const score = Math.abs((outer/count)-(inner/count));

      if(score>20){  // ลด threshold
        raw.push({x,y,score});
      }
    }
  }

  // ===== CLUSTER (merge จุดซ้ำ) =====
  let clusters=[];

  raw.forEach(p=>{

    let found=false;

    for(let c of clusters){
      const d = Math.hypot(c.x-p.x,c.y-p.y);

      if(d<20){
        // average
        c.x = (c.x + p.x)/2;
        c.y = (c.y + p.y)/2;
        c.score = Math.max(c.score,p.score);
        found=true;
        break;
      }
    }

    if(!found){
      clusters.push({...p});
    }
  });

  // ===== FILTER เอาเฉพาะวงจริง =====
  detected = clusters.filter(c => c.score > 25);

  drawAll();
  log.innerText = "detect " + detected.length;
}

// ===== SNAP GRID =====

function snapGrid(){

  if(detected.length===0){
    log.innerText="no detected";
    return;
  }

  samples = samples.map(s=>{

    const ix = s.x * scaleX;
    const iy = s.y * scaleY;

    let best=null;
    let bestD=9999;

    detected.forEach(d=>{
      const dist = Math.hypot(d.x-ix,d.y-iy);

      if(dist<bestD){
        bestD=dist;
        best=d;
      }
    });

    // 🔥 snap เฉพาะที่ใกล้จริง
    if(best && bestD < 25){
      return {
        x: best.x / scaleX,
        y: best.y / scaleY
      };
    }

    return s;
  });

  drawAll();
  log.innerText="snap refined";
}
// ===== RESET =====
function reset(){
  samples=[];
  detected=[];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(frame){
    drawAll();
  }

  log.innerText="reset";
}

// ===== UTIL =====
function toGray(img){
  const g=new Uint8ClampedArray(img.width*img.height);
  for(let i=0,j=0;i<img.data.length;i+=4,j++){
    g[j]=(img.data[i]+img.data[i+1]+img.data[i+2])/3;
  }
  return g;
}

</script>

</body>
</html>

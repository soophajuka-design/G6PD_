<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G6PD Analyzer</title>

<style>
body { margin:0; background:black; color:white; text-align:center; }

#container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin:auto;
}

video, canvas {
  width:100%;
  height:auto;
  display:block;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:2;
}
</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<button id="startBtn">Start Camera</button>
<button onclick="setMode('select')">Select</button>
<button onclick="setMode('normal')">Normal</button>
<button onclick="setMode('deficient')">Deficient</button>
<button onclick="analyze()">Analyze</button>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

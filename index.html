<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:system-ui;
  text-align:center;
}

#container {
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
  background:black;
}

video, canvas {
  width:100%;
  display:block;
}

canvas {
  position:absolute;
  top:0;
  left:0;
}

#controls {
  margin-top:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  color:white;
}

.start { background:#2563eb; }
.normal { background:#22c55e; }
.deficient { background:#ef4444; }
.analyze { background:#f59e0b; }
.reset { background:#6b7280; }

</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="controls">
  <button id="startBtn" class="start">Start</button>
  <button onclick="setMode('normal')" class="normal">Normal</button>
  <button onclick="setMode('deficient')" class="deficient">Deficient</button>
  <button id="analyzeBtn" class="analyze">Analyze</button>
  <button onclick="resetApp()" class="reset">Reset</button>
</div>

<script src="https://docs.opencv.org/4.5.5/opencv.js"></script>
<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

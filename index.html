<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:system-ui;
}

/* container เต็มจอ */
#container {
  position:relative;
  width:100vw;
  height:80vh;
  margin:auto;
  background:black;
}

/* video ไม่ crop */
video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* overlay */
canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* controls */
#controls {
  margin-top:10px;
}

button {
  padding:10px;
  margin:4px;
  border:none;
  border-radius:6px;
  color:white;
}

.start { background:blue; }
.normal { background:green; }
.deficient { background:red; }
.analyze { background:orange; }
.reset { background:gray; }

</style>
</head>

<body>

<h3>G6PD Analyzer (Baseline)</h3>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="controls">
  <button id="startBtn" class="start">Start</button>
  <button onclick="setMode('normal')" class="normal">Normal</button>
  <button onclick="setMode('deficient')" class="deficient">Deficient</button>
  <button id="analyzeBtn" class="analyze">Analyze</button>
  <button onclick="resetApp()" class="reset">Reset</button>
</div>

<script src="https://docs.opencv.org/4.5.5/opencv.js"></script>
<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }
.container { position:relative; display:inline-block; }
video { width:320px; background:black; }
canvas.overlay { position:absolute; top:0; left:0; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h2>G6PD Analyzer Pro</h2>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay" class="overlay" width="320" height="320"></canvas>
</div>

<br>

<button onclick="toggleCamera()">Start/Stop Camera</button>
<button onclick="detectGrid()">Auto Grid</button>
<button onclick="capture()">Capture</button>

<br><br>

Normal Control Index:
<input id="normalIdx" type="number" value="0">

Deficient Control Index:
<input id="defIdx" type="number" value="1">

<button onclick="setControl()">Set Control</button>

<canvas id="canvas" width="320" height="320"></canvas>

<pre id="result"></pre>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

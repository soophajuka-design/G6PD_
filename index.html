<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h3 { margin:10px; }

/* 🔥 FIX: lock ratio */
#container {
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
  aspect-ratio: 7.1 / 12.8;
  border-radius:12px;
  overflow:hidden;
  background:black;
}

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:2;
}

/* legend */
#legend {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  border-radius:8px;
  font-size:12px;
}

.dot {
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.dot.normal { background:#22c55e; }
.dot.deficient { background:#ef4444; }
.dot.selected { background:#facc15; }
.dot.grid { background:#fff; }

/* controls */
#controls {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
}

.start { background:#2563eb; }
.normal { background:#22c55e; }
.deficient { background:#ef4444; }
.analyze { background:#f59e0b; }
.reset { background:#6b7280; }

</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div id="legend">
    <div><span class="dot normal"></span> Normal</div>
    <div><span class="dot deficient"></span> Deficient</div>
    <div><span class="dot selected"></span> Selected</div>
  </div>
</div>

<div id="controls">
  <button id="startBtn" class="start">Start</button>
  <button onclick="setMode('normal')" class="normal">Normal</button>
  <button onclick="setMode('deficient')" class="deficient">Deficient</button>
  <button onclick="analyze()" class="analyze">Analyze</button>
  <button onclick="resetApp()" class="reset">Reset</button>
</div>

<script src="https://docs.opencv.org/4.5.5/opencv.js"></script>
<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="analyzer.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:black;
  color:white;
  text-align:center;
}

.container{
  position:relative;
  width:320px;
  margin:auto;
}

/* 🔥 lock aspect ratio 7.1:12.8 */
.aspect-box{
  position:relative;
  width:100%;
  padding-top: calc(12.8 / 7.1 * 100%);
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

canvas{
  pointer-events:none;
}
</style>
</head>

<body>

<h3>Grid Alignment (7.1 x 12.8 cm)</h3>

<div class="container">
  <div class="aspect-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="grid"></canvas>
  </div>
</div>

<br>
<button onclick="startCamera()">Start</button>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("grid");
const ctx = canvas.getContext("2d");

async function startCamera(){

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  video.onloadedmetadata = ()=>{
    video.play();
    resizeCanvas();
    drawGrid();
  };
}

function resizeCanvas(){

  const rect = video.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;
}

// ===== DRAW GRID =====
function drawGrid(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cols = 4;
  const rows = 5;

  const vw = canvas.width;
  const vh = canvas.height;

  // 🔥 margin รอบนอก (ปรับได้)
  const marginRatio = 0.15; // 15% ของจอ

  const usableW = vw * (1 - marginRatio*2);
  const usableH = vh * (1 - marginRatio*2);

  // 🔥 lock aspect ratio 7.1:12.8
  const targetRatio = 7.1 / 12.8;

  let gridW = usableW;
  let gridH = gridW / targetRatio;

  if(gridH > usableH){
    gridH = usableH;
    gridW = gridH * targetRatio;
  }

  // 🔥 center grid
  const offsetX = (vw - gridW)/2;
  const offsetY = (vh - gridH)/2;

  const cellW = gridW / cols;
  const cellH = gridH / rows;

  // ===== outer frame =====
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.strokeRect(offsetX, offsetY, gridW, gridH);

  // ===== grid lines =====
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = 1;

  for(let i=1;i<cols;i++){
    ctx.beginPath();
    ctx.moveTo(offsetX + i*cellW, offsetY);
    ctx.lineTo(offsetX + i*cellW, offsetY + gridH);
    ctx.stroke();
  }

  for(let j=1;j<rows;j++){
    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY + j*cellH);
    ctx.lineTo(offsetX + gridW, offsetY + j*cellH);
    ctx.stroke();
  }

  // ===== circles =====
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 1.5;

  const r = Math.min(cellW,cellH)*0.25;

  for(let rIdx=0;rIdx<rows;rIdx++){
    for(let cIdx=0;cIdx<cols;cIdx++){

      const cx = offsetX + (cIdx+0.5)*cellW;
      const cy = offsetY + (rIdx+0.5)*cellH;

      ctx.beginPath();
      ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.stroke();
    }
  }

  // ===== DEBUG (optional: show margin) =====
  ctx.strokeStyle = "rgba(255,0,0,0.3)";
  ctx.strokeRect(0,0,vw,vh);
}

// ===== resize fix =====
window.addEventListener("resize",()=>{
  resizeCanvas();
  drawGrid();
});

</script>

</body>
</html>

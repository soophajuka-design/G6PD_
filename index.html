<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6PD Analyzer AI</title>

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }

.container {
  position:relative;
  width:320px;
  margin:auto;
  overflow:hidden;
  touch-action:none;
}

video, canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h3>G6PD Analyzer AI</h3>

<div class="container" id="viewer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>

<button onclick="startCamera()">Start</button>
<button onclick="captureFrame()">Capture</button>
<button onclick="stopCamera()">Stop</button>

<br>

<button onclick="autoDetect()">Auto Detect</button>
<button onclick="autoAssignControl()">Auto Control</button>

<br>

<button onclick="resetSamples()">Reset</button>

<pre id="result"></pre>

<script src="app.js"></script>
<script src="ai.js"></script>

</body>
</html>

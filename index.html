<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G6PD Analyzer</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<h3>G6PD Analyzer</h3>

<div class="container">
  <video id="video" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<button id="camBtn">Start Camera</button>
<button onclick="detectGrid()">Auto Grid</button>
<button onclick="readRGB()">Read RGB</button>
<button onclick="processPaper()">Auto Rectify (7x12.6)</button>
<button onclick="processPaper()">1. Rectify</button>
<button onclick="generateGrid()">2. Generate Grid</button>
<button onclick="readG6PD()">3. Analyze G6PD</button>
<button onclick="detectCircles()">Auto Detect Circles</button>
<button onclick="runAll()">AUTO DETECT + GRID</button>

<br>

Normal: <input id="normalIdx" type="number" value="0">
Deficient: <input id="defIdx" type="number" value="1">

<pre id="debug"></pre>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

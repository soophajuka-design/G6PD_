<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>G6PD Analyzer Pro</title>

<link rel="manifest" href="manifest.json">

<style>
html, body {
  margin:0;
  padding:0;
  background:black;
  color:white;
  font-family:Arial;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

/* ===== CONTAINER ===== */
.container {
  position:relative;
  width:100vw;
  max-width:500px;
  aspect-ratio: 1 / 1;
  margin-top:10px;
}

/* ===== VIDEO ===== */
video {
  width:100%;
  height:100%;
  object-fit:cover; /* สำคัญ: เติมเต็ม + สมมาตร */
  background:black;
}

/* ===== OVERLAY ===== */
canvas.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* ===== BUTTON AREA ===== */
.controls {
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* ===== BUTTON ===== */
button {
  margin:5px;
  padding:10px;
  font-size:16px;
}

/* ===== RESULT ===== */
#result {
  width:90%;
  max-width:500px;
  text-align:left;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h3>G6PD Analyzer</h3>

<div class="container">
  <video id="video" playsinline muted></video>
  <canvas id="overlay" class="overlay"></canvas>
</div>

<div class="controls">
  <button id="camBtn">Start Camera</button>
  <button onclick="detectGrid()">Auto Grid</button>
  <button onclick="capture()">Capture</button>
</div>

<div class="controls">
  Normal:
  <input id="normalIdx" type="number" value="0" style="width:60px">
  Deficient:
  <input id="defIdx" type="number" value="1" style="width:60px">
  <button onclick="setControl()">Set</button>
</div>

<canvas id="canvas" width="320" height="320" style="display:none"></canvas>

<pre id="result"></pre>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
